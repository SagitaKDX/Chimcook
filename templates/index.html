<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chimcook Knowledge Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
    <!-- Link to the separated CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Knowledge Base</h1>
            <p class="subtitle">Upload text or markdown files to train your offline AI</p>
        </div>

        <!-- Left Panel: Upload -->
        <div class="panel">
            <h2><i data-lucide="upload-cloud"></i> Upload Documents</h2>
            
            <form id="uploadForm">
                <input type="file" id="fileInput" name="files" multiple>
                <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <i data-lucide="file-text" class="upload-icon" width="48" height="48"></i>
                    <p style="font-weight: 600; font-size: 1.1rem; margin-bottom: 0.5rem;">Click or Drag & Drop</p>
                    <p style="color: var(--text-dim); font-size: 0.9rem;">Supports Text (.txt) and Markdown (.md)</p>
                </div>
            </form>
            
            <div id="selectedFiles" style="margin-top: 1rem; color: var(--accent); font-weight: 600; text-align: center;"></div>
            
            <div id="uploadProgress" style="display: none; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 1rem;">
                <i data-lucide="loader" class="spin"></i> <span id="uploadText">Uploading...</span>
            </div>
        </div>

        <!-- Right Panel: Manage & Database -->
        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i data-lucide="database"></i> Vector Database</h2>
                <span id="dbStateBadge" style="padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.8rem; font-weight: 600; background: var(--bg-card); border: 1px solid var(--border);">Checking...</span>
            </div>
            
            <p style="color: var(--text-dim); font-size: 0.95rem; margin-bottom: 1rem; margin-top: 0.5rem;">Current files ready for injection:</p>
            
            <ul class="file-list" id="fileList">
                <!-- Populated via JS -->
            </ul>

            <button id="ingestBtn" class="btn" onclick="triggerIngestion()">
                <i data-lucide="cpu" id="ingestIcon"></i> 
                <span id="ingestText">Train Database</span>
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i data-lucide="info" id="toastIcon"></i>
        <span id="toastMessage">Message</span>
    </div>

    <script>
        // Safe Icon Initialization (Handles AdBlockers Blocking CDN)
        function safeUpdateIcons() {
            try {
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            } catch (e) {
                console.warn("Icons disabled by tracking prevention.");
            }
        }
        
        safeUpdateIcons();

        // Drag and Drop Logic
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const selectedFilesDiv = document.getElementById('selectedFiles');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            fileInput.files = dt.files;
            if(fileInput.files.length > 0) {
                uploadFilesAuto();
            }
        }

        fileInput.addEventListener('change', () => {
            if(fileInput.files.length > 0) {
                uploadFilesAuto();
            }
        }, false);

        function showToast(message, isError=false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.style.display = 'flex';
            if(isError) {
                toast.style.borderColor = 'var(--error)';
                toast.style.color = '#ef4444';
            } else {
                toast.style.borderColor = 'var(--success)';
                toast.style.color = '#10b981';
            }
            setTimeout(() => toast.style.display = 'none', 4000);
        }

        // Fetch Files on Load
        async function fetchFiles() {
            try {
                const res = await fetch('/files');
                const data = await res.json();
                const list = document.getElementById('fileList');
                list.innerHTML = '';
                if(data.files.length === 0) {
                    list.innerHTML = '<li style="color:var(--text-dim);text-align:center;padding:1rem;">No documents found.</li>';
                } else {
                    data.files.forEach(f => {
                        list.innerHTML += `<li class="file-item"><i data-lucide="file"></i> ${f}</li>`;
                    });
                }
                safeUpdateIcons();
            } catch (e) { console.error(e); }
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                const badge = document.getElementById('dbStateBadge');
                
                if (data.trained) {
                    badge.textContent = data.message;
                    badge.style.color = '#10b981';
                    badge.style.borderColor = '#10b981';
                } else {
                    badge.textContent = data.message;
                    badge.style.color = 'var(--text-dim)';
                    badge.style.borderColor = 'var(--border)';
                }
            } catch (e) { console.error(e); }
        }

        async function uploadFilesAuto() {
            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('files', fileInput.files[i]);
            }

            const progressDiv = document.getElementById('uploadProgress');
            progressDiv.style.display = 'flex';
            selectedFilesDiv.textContent = '';

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const result = await res.json();
                if(res.ok) {
                    showToast(result.message);
                    fetchFiles();
                    fileInput.value = '';
                } else {
                    showToast(result.error, true);
                }
            } catch (e) {
                showToast("Upload failed", true);
            } finally {
                progressDiv.style.display = 'none';
                safeUpdateIcons();
            }
        }

        async function triggerIngestion() {
            const btn = document.getElementById('ingestBtn');
            const icon = document.getElementById('ingestIcon');
            const text = document.getElementById('ingestText');
            
            text.textContent = 'Generating Vectors...';
            btn.disabled = true;
            btn.style.filter = 'brightness(0.7)';
            
            // Replace with spinning loader
            const oldIcon = icon.outerHTML;
            btn.innerHTML = `<i data-lucide="loader" class="spin"></i> Generating Vectors...`;
            safeUpdateIcons();

            try {
                const res = await fetch('/ingest', { method: 'POST' });
                const result = await res.json();
                if(res.ok) {
                    showToast("Database trained successfully!");
                    fetchStatus(); // Refresh status badge immediately
                } else {
                    showToast(result.error, true);
                }
            } catch (e) {
                showToast("Training failed", true);
            } finally {
                btn.innerHTML = `<i data-lucide="cpu"></i> Train Database`;
                btn.disabled = false;
                btn.style.filter = 'none';
                safeUpdateIcons();
            }
        }

        // Init
        fetchFiles();
        fetchStatus();
    </script>
</body>
</html>
