# ─────────────────────────────────────────────────────────────────────────────
# Chimcook Voice Assistant - Docker Compose
# Requires: Linux host with PulseAudio, microphone, and camera
# ─────────────────────────────────────────────────────────────────────────────

services:
  assistant:
    build: .
    container_name: chimcook-assistant
    restart: unless-stopped

    # Hardware access (mic, speaker, camera)
    privileged: true
    devices:
      - /dev/snd:/dev/snd           # ALSA audio devices
      - /dev/video0:/dev/video0     # Camera

    # PulseAudio for audio I/O
    volumes:
      - /run/user/1000/pulse:/run/user/1000/pulse:ro
      - ~/.config/pulse/cookie:/root/.config/pulse/cookie:ro # Authentication cookie
      - ./known_faces:/app/known_faces    # Face recognition photos
      - ./recordings:/app/recordings      # Debug recordings
      - ./core:/app/core                  # Live code editing
      - ./pipeline:/app/pipeline          # Live code editing
      - ./config:/app/config              # Live code editing
      - ./utils:/app/utils                # Live code editing
      - ./assets:/app/assets              # Sounds and images
    
    environment:
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - PULSE_COOKIE=/root/.config/pulse/cookie
      - XDG_RUNTIME_DIR=/run/user/1000
      - AUDIO_DEVICE=${AUDIO_DEVICE:-}
      - DEBUG=${DEBUG:-1}        # 1 = show per-frame VAD prob bars; set to 0 to disable
      - SAVE_AUDIO=${SAVE_AUDIO:-0}

    # Network not needed (fully offline)
    network_mode: none
