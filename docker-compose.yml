# ─────────────────────────────────────────────────────────────────────────────
# Chimcook Voice Assistant - Docker Compose
# Requires: Linux host with PulseAudio, microphone, and camera
# ─────────────────────────────────────────────────────────────────────────────

services:
  assistant:
    build: .
    container_name: chimcook-assistant
    restart: unless-stopped

    # Hardware access (mic, speaker, camera)
    privileged: true
    devices:
      - /dev/snd:/dev/snd           # ALSA audio devices
      - /dev/video0:/dev/video0     # Camera (built-in or index 0)
      - /dev/video1:/dev/video1     # USB composite camera (if present)
      - /dev/video2:/dev/video2     # USB composite camera sub-device
      - /dev/video3:/dev/video3     # USB composite camera sub-device
      - /dev/video4:/dev/video4     # USB composite camera sub-device

    # ── Resource limits (90 % of host CPU) ────────────────────────────────────
    # CPUS env var = number of CPU cores to allow (e.g. CPUS=7.2 for 8-core MiniPC)
    # Leave CPUS unset (or 0) to let Python threading control usage instead.
    cpus: "${CPUS:-0}"
    shm_size: 512m                  # Shared memory for large ML model loading

    # PulseAudio for audio I/O
    volumes:
      - /run/user/1000/pulse:/run/user/1000/pulse:ro
      - ~/.config/pulse/cookie:/root/.config/pulse/cookie:ro # Authentication cookie
      - ./known_faces:/app/known_faces    # Face recognition photos
      - ./recordings:/app/recordings      # Debug recordings
      - ./core:/app/core                  # Live code editing
      - ./pipeline:/app/pipeline          # Live code editing
      - ./config:/app/config              # Live code editing
      - ./utils:/app/utils                # Live code editing
      - ./assets:/app/assets              # Sounds and images
      - ./data:/app/data                  # Knowledge base index and docs
      - ./templates:/app/templates        # Web UI HTML templates
      - ./static:/app/static              # Web UI CSS stylesheets
      - ./web_ui.py:/app/web_ui.py        # Web UI application logic
    
    environment:
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - PULSE_COOKIE=/root/.config/pulse/cookie
      - XDG_RUNTIME_DIR=/run/user/1000
      - AUDIO_DEVICE=${AUDIO_DEVICE:-}
      - CAMERA_NAME=${CAMERA_NAME:-DV20}  # Auto-detect camera by V4L2 name (DV20=USB composite camera)
      - CAMERA_INDEX=${CAMERA_INDEX:-0}   # Fallback index if name not found
      - DEBUG=${DEBUG:-1}        # 1 = show per-frame VAD prob bars; set to 0 to disable
      - SAVE_AUDIO=${SAVE_AUDIO:-0}

    # Use host networking so the Flask Web UI (port 5000) is accessible from your browser
    network_mode: host
